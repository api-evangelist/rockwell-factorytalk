specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: rockwell-factorytalk
providerId: rockwell-factorytalk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automation
  - Manufacturing
  - Industrial
  - Rate Limiting
description: >-
  Rockwell does not publish category-level rate-limit numbers for FactoryTalk Optix, Hub, or
  DataMosaix REST APIs. Throttling, if any, is governed by license terms and per-site
  deployment rather than a public API contract.
notes: >-
  Public rate-limit documentation is not available. Reconcile against license/admin docs after
  Rockwell entitlement is in place.
sources:
  - https://docs.rockwellautomation.com/
responseCodes:
  throttled: 429
limits:
  - name: Per-license throttling
    scope: license
    metric: varies
    limit: see license documentation
    notes: >-
      Throughput is governed by the FactoryTalk Hub or Optix license tier and the on-prem or
      cloud deployment, not by a published public quota.
policies:
  - name: License-Bound Quotas
    description: >-
      Concurrent users, tag counts, and API throughput follow the purchased license SKU; refer
      to the FactoryTalk admin console for current limits.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
