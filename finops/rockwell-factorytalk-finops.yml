description: >-
  Rockwell FactoryTalk is licensed software sold through distributors. FinOps treatment is
  capex/opex license-driven rather than usage-metered.
notes: >-
  No public usage API or itemized billing exists. Cost is dominated by perpetual or
  subscription license SKUs and FactoryTalk Hub site contracts.
sources:
  - https://www.rockwellautomation.com/en-us/products/software/factorytalk.html
billingModel:
  pricingCategory: License-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Rockwell FactoryTalk
  ServiceCategory: Industrial Automation Software
  ProviderName: Rockwell Automation
  PublisherName: Rockwell Automation, Inc.
  BillingCurrency: USD
meters:
  - name: license_seats
    description: FactoryTalk licensed seats and tag counts per site
    unit: license
    aggregation: sum
    dimensions:
      - product
      - site
  - name: hub_subscription
    description: FactoryTalk Hub annual subscription
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - site
principles:
  - name: Visibility
    description: >-
      Track FactoryTalk license entitlements and renewal dates through Rockwell's licensing
      portal and the AP/procurement system.
  - name: Allocation
    description: >-
      Allocate FactoryTalk costs to the manufacturing site or production line that consumes
      the licenses, not to corporate IT.
  - name: Optimization
    description: >-
      Right-size license SKUs against actual tag and user counts; consolidate sites onto Hub
      where it lowers the per-site total.
  - name: Accountability
    description: >-
      Plant engineering and OT leadership own FactoryTalk license decisions; review annually
      against site headcount and connected-tag growth.
